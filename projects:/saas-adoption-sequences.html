    <section class="case-section">
      <h2>The problem</h2>
      <!-- 一段話：商業問題本身 + 誰會問這個問題（把 stakeholder 自然寫進來，例如 "a question any sales lead would ask"） -->
      <p>XXX</p>

      <h2>Approach</h2>
      <!-- 做了什麼，每一步附半句「為什麼選這個做法」。可以用 2-4 個短段落或一個 list -->
      <p>XXX</p>
    </section>

    <section class="case-section">
      <h2>Judgment calls</h2>
      <!-- 2-3 個妳做過的取捨。格式建議：遇到什麼問題 → 有哪些選項 → 我選了什麼、為什麼。這節是 hiring manager 最愛看的 -->
      <ul>
        <li>XXX</li>
        <li>XXX</li>
      </ul>
    </section>

    <section class="case-section">
      <h2>So what</h2>
      <!-- 結論 + 「如果我是這家公司的 product lead，我會做什麼」。還沒有結果的話，寫目前的假設跟預計何時有答案 -->
      <p>XXX</p>
